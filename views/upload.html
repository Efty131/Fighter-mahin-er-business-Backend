<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Product • Torit Shop</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page-upload">
    <div class="glass-panel">
        <h1>Upload Product</h1>
        
        <form action="/upload" method="POST">
            <!-- Product Name -->
            <div class="form-group">
                <label for="name" class="required">Product Name</label>
                <input type="text" id="name" name="name" placeholder="e.g., Wireless Noise Cancelling Headphones" required />
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description" class="required">Description</label>
                <textarea id="description" name="description" placeholder="Provide a detailed description of your product..." required></textarea>
            </div>

            <div style="display: flex; gap: 20px;">
                <!-- Price -->
                <div class="form-group" style="flex: 1;">
                    <label for="price" class="required">Price (৳)</label>
                    <input type="number" id="price" name="price" placeholder="0.00" step="0.01" min="0" required />
                </div>

                <!-- Category -->
                <div class="form-group" style="flex: 1;">
                    <label for="category" class="required">Category</label>
                    <input type="text" id="category" name="category" placeholder="e.g., Electronics" required />
                </div>
            </div>

            <!-- Images -->
            <div class="image-group">
                <label class="required image-group-title">Product Images</label>
                
                <label for="image1">Primary Image URL *</label>
                <input type="url" id="image1" name="images[]" placeholder="https://example.com/image1.jpg" required />
                
                <label for="image2">Additional Image 1 (Optional)</label>
                <input type="url" id="image2" name="images[]" placeholder="https://example.com/image2.jpg" />
                
                <label for="image3">Additional Image 2 (Optional)</label>
                <input type="url" id="image3" name="images[]" placeholder="https://example.com/image3.jpg" />
                
                <div class="hint">💡 Tip: Use direct image links ending in .jpg, .png, or .webp</div>
            </div>

            <button type="submit" class="btn">Publish Product</button>
        </form>

        <div class="link-text" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <a href="/auth/logout" id="logoutBtn" style="color: var(--error);">Logout</a>
        </div>
    </div>

    <script>
        document.getElementById('name').focus();
        
        document.getElementById('price').addEventListener('blur', function(e) {
            if (e.target.value) {
                e.target.value = parseFloat(e.target.value).toFixed(2);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/auth/logout');
            window.location.href = '/login';
        });
    </script>
</body>
</html>
