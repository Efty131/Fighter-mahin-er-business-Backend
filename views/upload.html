<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Product • Torit Shop</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg: #f8f9fa;
            --card: #fff;
            --text: #333;
            --border: #ddd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            line-height: 1.5;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: var(--card);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            margin-bottom: 24px;
            font-size: 1.8rem;
            text-align: center;
            color: var(--primary);
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .required::after {
            content: " *";
            color: #dc3545;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }
        textarea { min-height: 100px; resize: vertical; }
        .image-group {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 18px;
        }
        .image-group label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 4px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Upload Product</h1>
        
        <form action="/upload" method="POST">
            <!-- Product Name -->
            <div class="form-group">
                <label for="name" class="required">Product Name</label>
                <input type="text" id="name" name="name" placeholder="e.g., Mojo Cold Drinks" required />
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description" class="required">Description</label>
                <textarea id="description" name="description" placeholder="Describe your product..." required></textarea>
            </div>

            <!-- Price -->
            <div class="form-group">
                <label for="price" class="required">Price (৳)</label>
                <input type="number" id="price" name="price" placeholder="e.g., 25.50" step="0.01" min="0" required />
                <div class="hint">Enter price in Bangladeshi Taka</div>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category" class="required">Category</label>
                <input type="text" id="category" name="category" placeholder="e.g., Beverages, Electronics" required />
            </div>

            <!-- Images -->
            <div class="image-group">
                <label class="required">Product Images</label>
                
                <label for="image1">Primary Image URL *</label>
                <input type="url" id="image1" name="images[]" placeholder="https://..." required />
                
                <label for="image2" style="margin-top:10px">Additional Image 1 (Optional)</label>
                <input type="url" id="image2" name="images[]" placeholder="https://..." />
                
                <label for="image3" style="margin-top:10px">Additional Image 2 (Optional)</label>
                <input type="url" id="image3" name="images[]" placeholder="https://..." />
                
                <label for="image4" style="margin-top:10px">Additional Image 3 (Optional)</label>
                <input type="url" id="image4" name="images[]" placeholder="https://..." />
                
                <div class="hint">💡 Tip: Use direct image links (ending in .jpg, .png, .webp)</div>
            </div>

            <button type="submit" class="btn">✨ Upload Product</button>
        </form>
    </div>

    <!-- Optional: Auto-format price input -->
    <script>
        // Auto-focus first field
        document.getElementById('name').focus();
        
        // Optional: Format price with 2 decimals on blur
        document.getElementById('price').addEventListener('blur', function(e) {
            if (e.target.value) {
                e.target.value = parseFloat(e.target.value).toFixed(2);
            }
        });
    </script>
</body>
</html>
